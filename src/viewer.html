<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vorovayka Viewer</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Vorovayka</p>
        <h1>Viewer</h1>
        <p class="lead">DOM preview с матчами полей, выбранные API и экспорт без лишних секций.</p>
      </header>
      <section id="state" class="card">
        <p>Жду новый или последний сохранённый захват...</p>
      </section>
      <section class="card card--debug">
        <details class="debug-panel">
          <summary>Подробнее: сырой capture JSON</summary>
          <pre id="json"></pre>
        </details>
      </section>
    </main>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
